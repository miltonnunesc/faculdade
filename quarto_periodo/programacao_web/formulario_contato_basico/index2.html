<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style rel="stylesheet" href="styles.css"></style>
</head>
<body>
    <label for="name">Nome:</label>
    <input type="text" id="name" name="name">
    <br>
    <label for="email">Email</label>
    <input type="email" id="email" name="email">
    <br>
    <label for="estado">Estado:</label>
    <select id="estado" name="estado">
        <option value="selecione">Selecione</option>
        <option value="sp">São Paulo</option>
    </select>
    <br>
    <label for="preferencia">Preferência:
        <input type="checkbox" id="preferencia" name="preferencia" value="Campo">Campo
        <input type="checkbox" id="preferencia" name="preferencia" value="montanha">Montanha
    </label>
    <br>
    <label for="tipoviagem">Tipo de Viagem:
        <input type="radio" id="tipoviagem" name="tipoviagem" value="negocios">Negócios
        <input type="radio" id="tipoviagem" name="tipoviagem" value="passeio">Passeio
    </label>
</body>
</html>
